name: Deploy physics demos to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build static site
        run: |
          mkdir -p _site/lens-interactive-demo/assets
          cp index.html _site/index.html
          cp lens-interactive-demo/assets/tangtang-tangdou-logo-clean.png _site/lens-interactive-demo/assets/
          cp lens-interactive-demo/index.html _site/lens-interactive-demo/index.html
          touch _site/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
